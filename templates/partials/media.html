<link rel="stylesheet" href="{{ url_for('static', filename='css/media.css') }}">

<div class="remote-wrapper">
  <div class="controls">
    <button class="media-btn" data-key="up">↑</button>
    <button class="media-btn" data-key="space">▶</button>
    <button class="media-btn small" data-key="fullscreen">⛶</button>

    <button class="media-btn" data-key="left">←</button>
    <button class="media-btn" data-key="down">↓</button>
    <button class="media-btn" data-key="right">→</button>

    <button class="media-btn volume" data-key="vol-up">+</button>
    <button class="media-btn volume" data-key="mute">🔇</button>
    <button class="media-btn volume" data-key="vol-down">−</button>
  </div>
</div>
