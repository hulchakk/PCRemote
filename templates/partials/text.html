<link rel="stylesheet" href="{{ url_for('static', filename='css/text.css') }}">

<div class="remote-wrapper">
  <div class="text-container">
    <textarea id="text-input" placeholder="Type text here..." rows="3"></textarea>

    <div class="text-controls">
      <button class="remote-btn browser-btn" data-key="back" title="Back">←</button>
      <button class="remote-btn browser-btn" data-key="forward" title="Forward">→</button>
      <button class="remote-btn browser-btn" data-key="refresh" title="Refresh">🔄</button>

      <button class="remote-btn enter-btn" data-key="enter">Enter ↵</button>
    </div>
  </div>
</div>
